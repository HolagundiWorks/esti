# ESTI AORMS — firm product overlay (closed, no public marketing site).
#
# Use this on top of compose.prod.yaml to build the firm variant: no landing,
# blog, investors or one-click demo — unauthenticated visitors go straight to
# /login. Pair it with SEED_DEMO=false so no demo data is seeded.
#
#   # Build the firm frontend:
#   docker compose -f compose.prod.yaml -f compose.firm.yaml --profile build-only build frontend
#
#   # Deploy without demo data:
#   SEED_DEMO=false bash deploy/deploy.sh
#
# (Equivalent one-off without this file:
#   VITE_PUBLIC_SITE=false docker compose -f compose.prod.yaml --profile build-only build frontend)

services:
  frontend:
    build:
      args:
        VITE_PUBLIC_SITE: "false"
