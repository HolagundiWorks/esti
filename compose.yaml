# ESTI AORMS — greenfield development pod (Podman).
#   podman compose up -d --build
# Everything runs in containers — nothing is installed on the host.
# No Dolibarr, no PHP, no MariaDB.
name: esti-aorms

services:
  db:
    image: docker.io/library/postgres:16-alpine
    container_name: esti-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-esti}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-esti}
      POSTGRES_DB: ${POSTGRES_DB:-esti}
    ports: ["5432:5432"]
    volumes: ["esti-db-data:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U esti"]
      interval: 10s
      retries: 5

  redis:
    image: docker.io/library/redis:7-alpine
    container_name: esti-redis
    ports: ["6379:6379"]

  minio:
    image: docker.io/minio/minio:latest
    container_name: esti-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-esti}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-esti-secret}
    ports: ["9000:9000", "9001:9001"]
    volumes: ["esti-minio-data:/data"]

  backend:
    image: localhost/esti-backend:dev
    container_name: esti-backend
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      BACKEND_PORT: "4000"
      SESSION_SECRET: ${SESSION_SECRET:-dev-session-secret-change-me}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173}
      DATABASE_URL: ${DATABASE_URL:-postgres://esti:esti@db:5432/esti}
      REDIS_URL: redis://redis:6379
      S3_ENDPOINT: http://minio:9000
      S3_PUBLIC_ENDPOINT: ${S3_PUBLIC_ENDPOINT:-http://localhost:9000}
      S3_BUCKET: ${S3_BUCKET:-esti-documents}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-esti}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-esti-secret}
      # First-run owner (consumed by `pnpm --filter @esti/backend seed`).
      SEED_OWNER_EMAIL: ${SEED_OWNER_EMAIL:-owner@hcw.in}
      SEED_OWNER_PASSWORD: ${SEED_OWNER_PASSWORD:-ChangeMe123}
      SEED_OWNER_NAME: ${SEED_OWNER_NAME:-HCW Owner}
    # Dev hot-reload: host source is mounted over the image; node_modules stays.
    volumes:
      - ./backend/src:/app/backend/src
      - ./packages/contracts/src:/app/packages/contracts/src
    ports: ["4000:4000"]
    depends_on: [db, redis]

  worker:
    image: localhost/esti-worker:dev
    container_name: esti-worker
    environment:
      REDIS_URL: redis://redis:6379
      DATABASE_URL: ${DATABASE_URL:-postgres://esti:esti@db:5432/esti}
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: ${S3_BUCKET:-esti-documents}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-esti}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-esti-secret}
    depends_on: [redis, minio]

  frontend:
    image: localhost/esti-frontend:dev
    container_name: esti-frontend
    environment:
      VITE_API_URL: http://localhost:4000
      VITE_PROXY_TARGET: http://backend:4000
    volumes:
      - ./frontend/src:/app/frontend/src
      - ./packages/contracts/src:/app/packages/contracts/src
      - ./backend/src:/app/backend/src # type-only: SPA imports AppRouter
    ports: ["5173:5173"]
    depends_on: [backend]

volumes:
  esti-db-data:
  esti-minio-data:
