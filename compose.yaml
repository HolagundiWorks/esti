# ESTI AORMS — greenfield development stack (Docker Compose).
#   docker compose up -d --build
# Everything runs in containers — nothing is installed on the host.
# No Dolibarr, no PHP, no MariaDB.
name: esti-aorms

# Every service sets `restart: unless-stopped` so the stack comes back by itself
# when the Docker daemon restarts — on WSL the VM is recycled when idle, which
# otherwise leaves the whole stack down until someone runs `up` again. An
# explicit `aorms stop` still stays stopped.
services:
  db:
    image: docker.io/library/postgres:16-alpine
    container_name: esti-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-esti}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-esti}
      POSTGRES_DB: ${POSTGRES_DB:-esti}
    ports: ["5432:5432"]
    volumes: ["esti-db-data:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U esti"]
      interval: 10s
      retries: 5

  redis:
    image: docker.io/library/redis:7-alpine
    container_name: esti-redis
    restart: unless-stopped
    ports: ["6379:6379"]

  minio:
    image: docker.io/minio/minio:latest
    container_name: esti-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-esti}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-esti-secret}
    ports: ["9000:9000", "9001:9001"]
    volumes: ["esti-minio-data:/data"]

  backend:
    image: localhost/esti-backend:dev
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: esti-backend
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      BACKEND_PORT: "4000"
      SESSION_SECRET: ${SESSION_SECRET:-dev-session-secret-change-me}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173}
      DATABASE_URL: ${DATABASE_URL:-postgres://esti:esti@db:5432/esti}
      REDIS_URL: redis://redis:6379
      S3_ENDPOINT: http://minio:9000
      S3_PUBLIC_ENDPOINT: ${S3_PUBLIC_ENDPOINT:-http://localhost:9000}
      S3_BUCKET: ${S3_BUCKET:-esti-documents}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-esti}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-esti-secret}
      WORKER_JOB_STREAM: ${WORKER_JOB_STREAM:-esti:jobs}
      BUILD_REVISION: ${BUILD_REVISION:-dev}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
      # Keep this untagged and in sync with .env.example / compose.prod.yaml.
      # `ollama pull llama3.2` fetches `llama3.2:latest`; a tagged default like
      # `llama3.2:1b` would not match it, so the health check fails and the AI
      # gateway silently falls back to canned template output.
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.2}
      # EOMS compliance Knowledge Bank — a separate LOCAL service (the desktop
      # companion, default :8756) running on the HOST. Reach it via the host
      # gateway (see extra_hosts). Empty disables the integration (reads degrade).
      EOMS_API_URL: ${EOMS_API_URL:-http://host.docker.internal:8756}
      # First-run owner (consumed by `pnpm --filter @esti/backend seed`).
      SEED_OWNER_EMAIL: ${SEED_OWNER_EMAIL:-owner@hcw.in}
      SEED_OWNER_PASSWORD: ${SEED_OWNER_PASSWORD:-ChangeMe123}
      SEED_OWNER_NAME: ${SEED_OWNER_NAME:-HCW Owner}
      # Licensing platform — Google sign-in for /platform/onboard ("Create account").
      # Supply GOOGLE_CLIENT_ID / GOOGLE_CLIENT_SECRET via a gitignored root .env;
      # without them /platform/auth/google/start returns google_oauth_not_configured.
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI:-http://localhost:5173/platform/auth/google/callback}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost:5173}
      ONBOARD_RETURN_ORIGINS: ${ONBOARD_RETURN_ORIGINS:-http://localhost:5173}
      PLATFORM_ADMIN_EMAILS: ${PLATFORM_ADMIN_EMAILS:-}
      # Unified individual accounts (Phase 34): workspace login accepts local
      # platform accounts in-process. Off by default; set true to exercise it.
      ESTI_UNIFIED_ACCOUNTS: ${ESTI_UNIFIED_ACCOUNTS:-true}
      # CI e2e sets true — one runner IP signs in many personas in one suite.
      ESTI_RELAX_AUTH_LIMITS: ${ESTI_RELAX_AUTH_LIMITS:-false}
      SEED_DEMO_PASSWORD: ${SEED_DEMO_PASSWORD:-demo1234}
      DEMO_MASTER_PASSWORD: ${DEMO_MASTER_PASSWORD:-aorms-demo-admin}
      DEMO_MIDNIGHT_RESET: ${DEMO_MIDNIGHT_RESET:-true}
    # Dev hot-reload: host source is mounted over the image; node_modules stays.
    # vendor/ supplies the HCW kit packages — pnpm workspace symlinks point here.
    volumes:
      - ./backend/src:/app/esti/backend/src
      - ./backend/drizzle:/app/esti/backend/drizzle
      - ./packages/contracts/src:/app/esti/packages/contracts/src
      - ./vendor:/app/esti/vendor
    ports: ["4000:4000"]
    # Reach the host (where the EOMS desktop companion listens on :8756). Under
    # Docker Engine `host.docker.internal` is not automatic — map it to the host
    # gateway so EOMS_API_URL=http://host.docker.internal:8756 resolves.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      db:
        condition: service_started
      redis:
        condition: service_started
      ollama:
        condition: service_healthy

  ollama:
    image: docker.io/ollama/ollama:latest
    container_name: esti-ollama
    restart: unless-stopped
    ports: ["11434:11434"]
    volumes: ["esti-ollama-data:/root/.ollama"]
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  worker:
    image: localhost/esti-worker:dev
    build:
      context: .
      dockerfile: worker/Dockerfile.dev
    container_name: esti-worker
    restart: unless-stopped
    environment:
      REDIS_URL: redis://redis:6379
      DATABASE_URL: ${DATABASE_URL:-postgres://esti:esti@db:5432/esti}
      WORKER_JOB_STREAM: ${WORKER_JOB_STREAM:-esti:jobs}
      WORKER_GROUP: ${WORKER_GROUP:-esti-workers}
      WORKER_DEAD_LETTER_STREAM: ${WORKER_DEAD_LETTER_STREAM:-esti:jobs:dead}
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: ${S3_BUCKET:-esti-documents}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-esti}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-esti-secret}
    volumes:
      # Dev hot-reload: job handlers (incl. pdf_to_markdown for Knowledge Bank portal).
      - ./worker/esti_worker:/app/esti_worker
    depends_on:
      db:
        condition: service_started
      redis:
        condition: service_started
      minio:
        condition: service_started

  frontend:
    image: localhost/esti-frontend:dev
    build:
      context: .
      dockerfile: frontend/Dockerfile.dev
    container_name: esti-frontend
    restart: unless-stopped
    environment:
      VITE_API_URL: http://localhost:4000
      VITE_PROXY_TARGET: http://backend:4000
    # vendor/ mirrors the production layout: Vite aliases resolve to vendor/hcw-*/dist/
    # and Vite's fs.allow covers estiRoot which includes vendor/.
    volumes:
      - ./frontend/vite.config.ts:/app/esti/frontend/vite.config.ts
      - ./frontend/src:/app/esti/frontend/src
      - ./frontend/public:/app/esti/frontend/public
      - ./packages/contracts/src:/app/esti/packages/contracts/src
      - ./backend/src:/app/esti/backend/src # type-only: SPA imports AppRouter
      # Mount only the kit dist/ (not all of vendor/) — a whole-vendor mount
      # hides the vendor packages' node_modules created by pnpm install in the
      # image, breaking peer-dep resolution (e.g. @mui/* from hcw-ui-kit).
      - ./vendor/hcw-ui-kit/dist:/app/esti/vendor/hcw-ui-kit/dist
      - ./vendor/hcw-aorms-ai-kit/dist:/app/esti/vendor/hcw-aorms-ai-kit/dist
    ports: ["5173:5173"]
    depends_on: [backend]

volumes:
  esti-db-data:
  esti-minio-data:
  esti-ollama-data:
