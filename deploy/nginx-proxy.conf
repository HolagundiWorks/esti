# ESTI AORMS — host nginx reverse proxy
# Place at:  /etc/nginx/sites-available/esti
# Enable:    sudo ln -s /etc/nginx/sites-available/esti /etc/nginx/sites-enabled/esti
#            sudo nginx -t && sudo systemctl reload nginx
#
# Certbot will append an SSL server block automatically when you run:
#   sudo certbot --nginx -d DOMAIN_PLACEHOLDER
#
# Replace DOMAIN_PLACEHOLDER with your actual hostname (no https://) before deploying.
# bootstrap.sh substitutes DEPLOY_DIR_PLACEHOLDER with the actual deploy path
# (e.g. /opt/esti), so the static root becomes /opt/esti/frontend/dist.

# WebSocket connection-upgrade map. Defined here at http context (sites-enabled/*
# is included inside nginx's http{} block) so $connection_upgrade resolves in the
# /trpc/ location below.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

upstream esti_backend {
    server 127.0.0.1:4000;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    # Hostname only — e.g. aorms.in (setup-vps.sh validates before nginx -t).
    server_name DOMAIN_PLACEHOLDER;

    # ── File upload limit (drawings, reconcile imports) ──────────────────────
    client_max_body_size 50m;

    # ── Security headers ─────────────────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # Strict-Transport-Security is added by certbot after SSL is provisioned.

    # ── tRPC API (includes WebSocket upgrade for tRPC subscriptions) ─────────
    location /trpc/ {
        proxy_pass         http://esti_backend/trpc/;
        proxy_http_version 1.1;

        # WebSocket upgrade headers (tRPC subscriptions use ws).
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection $connection_upgrade;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Request-Id      $request_id;

        proxy_read_timeout  300s;
        proxy_send_timeout  300s;
        proxy_buffering     off;
    }

    # ── Binary upload endpoints (logo, drawings, reconcile CSV/XLSX) ─────────
    location /upload/ {
        proxy_pass         http://esti_backend/upload/;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Give WeasyPrint/large draws time to process.
        proxy_read_timeout  120s;
        proxy_send_timeout  120s;

        # Upload size already controlled by client_max_body_size above.
        proxy_request_buffering off;
    }

    # ── iCal workload feed (Google Calendar subscription) ────────────────────
    location /calendar/ {
        proxy_pass         http://esti_backend/calendar/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout  60s;
    }

    # ── Liveness / readiness probes ──────────────────────────────────────────
    location = /health {
        proxy_pass         http://esti_backend/health;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        access_log         off;
    }

    location = /readyz {
        proxy_pass         http://esti_backend/readyz;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        access_log         off;
    }

    # ── React SPA (static files) ─────────────────────────────────────────────
    # Serve the Vite-compiled dist/ directly from disk.
    # After every deploy, deploy.sh rebuilds the frontend image and copies
    # the new frontend/dist to DEPLOY_DIR_PLACEHOLDER/frontend/dist.
    location / {
        root       DEPLOY_DIR_PLACEHOLDER/frontend/dist;
        index      index.html;

        # SPA fallback: unknown paths get index.html, React Router takes over.
        try_files  $uri $uri/ /index.html;

        # Vite hashes JS/CSS filenames — safe to cache forever.
        location ~* \.(js|css|woff2?|ttf|eot|otf|svg|png|jpg|jpeg|gif|ico|webp)$ {
            expires    1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # ── SSL placeholder (certbot fills this in) ───────────────────────────────
    # After running: sudo certbot --nginx -d DOMAIN_PLACEHOLDER
    # certbot will add the following block automatically:
    #
    # listen 443 ssl;
    # listen [::]:443 ssl;
    # ssl_certificate     /etc/letsencrypt/live/DOMAIN_PLACEHOLDER/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/DOMAIN_PLACEHOLDER/privkey.pem;
    # include             /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;
}
