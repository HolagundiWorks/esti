# ESE (Estimation Specification Engine) reverse proxy — ese.<domain>.
# Installed by deploy/install-ese.sh (DOMAIN_PLACEHOLDER → your base domain).
# HTTP-only here; certbot --nginx appends the :443 block + HTTP→HTTPS redirect.
server {
    listen 80;
    listen [::]:80;
    server_name ese.DOMAIN_PLACEHOLDER;

    # Source PDFs / markdown workbooks can be large.
    client_max_body_size 50m;

    location / {
        proxy_pass         http://127.0.0.1:4100;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        # Ollama analysis passes can run long.
        proxy_read_timeout 300s;
    }
}
