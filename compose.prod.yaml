# ESTI AORMS — production compose.
#   docker compose -f compose.prod.yaml up -d --build
# Requires a .env file at the repo root — copy deploy/.env.production.example to .env and fill it.
# No host port exposure except for the nginx reverse-proxy ports (80/443 handled by the host nginx).
name: esti-aorms-prod

services:

  # ── PostgreSQL (system of record) ─────────────────────────────────────────────
  # Service name is esti-db so DATABASE_URL can use "esti-db" as hostname.
  esti-db:
    image: postgres:16-alpine
    container_name: esti-db
    restart: always
    environment:
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB:       ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    # No host port binding — database is internal only.
    networks:
      - esti-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-esti}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ── Redis (job bus + sessions) ────────────────────────────────────────────────
  # Service name is esti-redis so REDIS_URL can use "esti-redis" as hostname.
  esti-redis:
    image: redis:7-alpine
    container_name: esti-redis
    restart: always
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redisdata:/data
    # No host port binding — redis is internal only.
    networks:
      - esti-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MinIO (S3-compatible object storage) ──────────────────────────────────────
  # Remove this service and set S3_ENDPOINT to your managed S3/B2 provider if
  # you prefer not to self-host object storage.
  esti-minio:
    image: minio/minio:latest
    container_name: esti-minio
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER:     ${S3_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY}
    volumes:
      - miniodata:/data
    # Neither port is exposed to the internet.  Access the console via an SSH
    # tunnel: ssh -L 9001:localhost:9001 user@server
    networks:
      - esti-network
    # No in-container healthcheck — the server image is distroless (no shell/curl/mc).
    # bootstrap/setup scripts probe MinIO with an mc sidecar; backend retries bucket setup.

  # ── Ollama (local LLM for AI Studio — internal only) ─────────────────────────
  esti-ollama:
    image: ollama/ollama:latest
    container_name: esti-ollama
    restart: always
    volumes:
      - ollamadata:/root/.ollama
    networks:
      - esti-network

  # ── Backend (Fastify / tRPC) ──────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile.prod
    container_name: esti-backend
    restart: always
    env_file: .env
    environment:
      NODE_ENV:           production
      BACKEND_PORT:       "4000"
      DATABASE_URL:       ${DATABASE_URL}
      REDIS_URL:          ${REDIS_URL}
      SESSION_SECRET:     ${SESSION_SECRET}
      COOKIE_SECURE:      ${COOKIE_SECURE:-true}
      ALLOWED_ORIGINS:    ${ALLOWED_ORIGINS}
      S3_ENDPOINT:        ${S3_ENDPOINT}
      S3_PUBLIC_ENDPOINT: ${S3_PUBLIC_ENDPOINT}
      S3_BUCKET:          ${S3_BUCKET}
      S3_ACCESS_KEY:      ${S3_ACCESS_KEY}
      S3_SECRET_KEY:      ${S3_SECRET_KEY}
      WORKER_JOB_STREAM:  ${WORKER_JOB_STREAM:-esti:jobs}
      BUILD_REVISION:     ${BUILD_REVISION:-dev}
      OLLAMA_BASE_URL:      ${OLLAMA_BASE_URL:-http://esti-ollama:11434}
      OLLAMA_MODEL:         ${OLLAMA_MODEL:-llama3.2}
    # Port 4000 bound to 127.0.0.1 only — host nginx proxies /trpc and /upload.
    ports:
      - "127.0.0.1:4000:4000"
    networks:
      - esti-network
    depends_on:
      esti-db:
        condition: service_healthy
      esti-redis:
        condition: service_healthy
      esti-minio:
        condition: service_started
      esti-ollama:
        condition: service_started
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:4000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s

  # ── Frontend build container ──────────────────────────────────────────────────
  # Under the `build-only` profile so `docker compose up -d` never starts it.
  # install.sh / update.sh build this image, create a temporary container,
  # use `docker cp` to copy the compiled dist out to the host filesystem, then
  # remove the container.  The host nginx (deploy/nginx-proxy.conf) serves the
  # static files directly from DEPLOY_DIR/frontend/dist — no nginx container
  # needed at runtime.
  #
  # Usage in deploy scripts:
  #   docker compose -f compose.prod.yaml --profile build-only build frontend
  #   docker create --name esti-frontend-tmp esti-frontend:prod
  #   docker cp esti-frontend-tmp:/usr/share/nginx/html/. ./frontend/dist/
  #   docker rm esti-frontend-tmp
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile.prod
      args:
        # Baked into SPA at build time — set in .env before `deploy.sh` / bootstrap frontend build.
        VITE_FULL_DEMO_URL: ${VITE_FULL_DEMO_URL:-}
        BUILD_REVISION: ${BUILD_REVISION:-dev}
        # "true" = public demo site (landing/blog/investors/legal). Override with
        # compose.firm.yaml (or VITE_PUBLIC_SITE=false) for the firm product.
        VITE_PUBLIC_SITE: ${VITE_PUBLIC_SITE:-true}
        # Standalone licensing console origin (admin.DOMAIN, its own repo/deploy).
        VITE_ADMIN_URL: ${VITE_ADMIN_URL:-}
        # AORMS installer download URLs — baked into the /download portal CTAs.
        VITE_LITE_DOWNLOAD_URL: ${VITE_LITE_DOWNLOAD_URL:-}
        VITE_PRO_DOWNLOAD_URL: ${VITE_PRO_DOWNLOAD_URL:-}
        VITE_COMMUNITY_DOWNLOAD_URL: ${VITE_COMMUNITY_DOWNLOAD_URL:-}
        VITE_CORE_DOWNLOAD_URL: ${VITE_CORE_DOWNLOAD_URL:-}
        VITE_ENTERPRISE_DOWNLOAD_URL: ${VITE_ENTERPRISE_DOWNLOAD_URL:-}
        # Standalone Estimate desktop app installer (coming-soon fallback if unset).
        VITE_ESTIMATION_DOWNLOAD_URL: ${VITE_ESTIMATION_DOWNLOAD_URL:-}
    image: esti-frontend:prod
    # No entrypoint override needed — the runner stage nginx image is used only
    # as a build artefact holder; the container is never started as a daemon.
    profiles:
      - build-only

  # ── Python worker (ezdxf / WeasyPrint / pandas) ───────────────────────────────
  worker:
    build:
      context: .
      dockerfile: worker/Dockerfile
    container_name: esti-worker
    restart: always
    env_file: .env
    environment:
      DATABASE_URL:              ${DATABASE_URL}
      REDIS_URL:                 ${REDIS_URL}
      WORKER_JOB_STREAM:         ${WORKER_JOB_STREAM:-esti:jobs}
      WORKER_GROUP:              ${WORKER_GROUP:-esti-workers}
      WORKER_MAX_RETRIES:        "3"
      WORKER_RECLAIM_IDLE_MS:    "30000"
      WORKER_DEAD_LETTER_STREAM: "esti:jobs:dead"
      MLFLOW_TRACKING_URI:       ${MLFLOW_TRACKING_URI:-sqlite:////app/mlruns/mlflow.db}
      GIT_PYTHON_REFRESH:        ${GIT_PYTHON_REFRESH:-quiet}
      EVIDENTLY_DISABLE_TELEMETRY: ${EVIDENTLY_DISABLE_TELEMETRY:-1}
      S3_ENDPOINT:               ${S3_ENDPOINT}
      S3_BUCKET:                 ${S3_BUCKET}
      S3_ACCESS_KEY:             ${S3_ACCESS_KEY}
      S3_SECRET_KEY:             ${S3_SECRET_KEY}
    volumes:
      - mlruns:/app/mlruns
    networks:
      - esti-network
    depends_on:
      esti-db:
        condition: service_healthy
      esti-redis:
        condition: service_healthy
      esti-minio:
        condition: service_started

networks:
  esti-network:
    driver: bridge

volumes:
  pgdata:
  redisdata:
  miniodata:
  ollamadata:
  mlruns:
