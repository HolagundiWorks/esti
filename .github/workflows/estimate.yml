name: estimate-installer

# Builds the AORMS Estimate desktop app — a native C++ host (no Rust, no server)
# that embeds the OS webview to render the offline estimating SPA and runs the
# C++ engine + vendored SQLite in-process (estimate/desktop-cpp). Windows-only
# (NSIS). Trigger manually, or on an `estimate-v*` tag to publish a Release.
#
# The published asset is named AORMS-Estimate-Setup.exe — the stable name the
# landing download link (VITE_ESTIMATION_DOWNLOAD_URL) and the live resolver
# (backend desktopInstallers) match against. Keep it stable.
on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Publish a Release under this estimate-v* tag (created if missing). Empty = build only."
        required: false
        type: string
  push:
    tags:
      - "estimate-v*"

permissions:
  contents: write

concurrency:
  group: estimate-${{ github.ref }}
  cancel-in-progress: true

env:
  WEBVIEW2_VERSION: "1.0.2792.45"

jobs:
  windows:
    name: Windows Estimate installer (C++ / NSIS)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: pnpm }
      - uses: nuget/setup-nuget@v2

      - name: Install NSIS (for CPack)
        run: choco install nsis -y --no-progress

      - name: Install dependencies
        run: pnpm install

      - name: Build the estimating SPA as a single-file bundle (estimate/dist/index.html)
        run: pnpm --filter @esti/estimate build
        env:
          ESTI_SINGLEFILE: "1"

      - name: Restore the WebView2 SDK (NuGet)
        shell: pwsh
        run: |
          nuget install Microsoft.Web.WebView2 -Version $env:WEBVIEW2_VERSION -OutputDirectory "$env:GITHUB_WORKSPACE/nuget" -NonInteractive
          echo "WEBVIEW2_DIR=$env:GITHUB_WORKSPACE/nuget/Microsoft.Web.WebView2.$env:WEBVIEW2_VERSION" >> $env:GITHUB_ENV

      - name: Configure & build (CMake, Release)
        run: |
          cmake -S estimate/desktop-cpp -B estimate/desktop-cpp/build -A x64 -DWEBVIEW2_DIR="${{ env.WEBVIEW2_DIR }}"
          cmake --build estimate/desktop-cpp/build --config Release

      - name: Run engine + C-ABI tests
        working-directory: estimate/desktop-cpp/build
        run: ctest -C Release --output-on-failure

      - name: Package the installer (CPack / NSIS)
        working-directory: estimate/desktop-cpp/build
        run: cpack -G NSIS -C Release

      - name: Locate the installer
        id: installer
        shell: pwsh
        run: |
          $exe = Get-ChildItem -Path estimate/desktop-cpp/build -Filter "AORMS-Estimate-Setup.exe" -Recurse | Select-Object -First 1
          if (-not $exe) { throw "installer not found" }
          "path=$($exe.FullName)" >> $env:GITHUB_OUTPUT

      - uses: actions/upload-artifact@v4
        with:
          name: aorms-estimate-windows
          path: ${{ steps.installer.outputs.path }}
          if-no-files-found: error

      - name: Publish to GitHub Release
        if: inputs.release_tag != '' || startsWith(github.ref, 'refs/tags/estimate-v')
        uses: softprops/action-gh-release@v2
        with:
          name: AORMS Estimate ${{ inputs.release_tag || github.ref_name }}
          tag_name: ${{ inputs.release_tag || github.ref_name }}
          files: ${{ steps.installer.outputs.path }}
