name: estimate-installer

# Builds the AORMS Estimate desktop app — a thin Tauri/NSIS shell over the
# offline estimating SPA (no backend). Windows-only (NSIS). Trigger manually, or
# on an `estimate-v*` tag to publish a Release.
on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Publish a Release under this estimate-v* tag (created if missing). Empty = build only."
        required: false
        type: string
  push:
    tags:
      - "estimate-v*"

# Publishing a Release needs write access to repository contents; without this
# the default GITHUB_TOKEN is read-only and action-gh-release 403s.
permissions:
  contents: write

concurrency:
  group: estimate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  windows:
    name: Windows Estimate installer (NSIS)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: pnpm }

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with: { workspaces: estimate/src-tauri }

      - name: Install tauri-cli
        run: cargo install tauri-cli --version "^2.0" --locked

      - name: Install dependencies
        run: pnpm install

      - name: Build the estimating SPA (estimate/dist)
        run: pnpm --filter @esti/estimate build

      - name: Generate Tauri icons
        shell: bash
        run: |
          mkdir -p estimate/src-tauri/icons
          cargo tauri icon frontend/public/android-chrome-512x512.png -o estimate/src-tauri/icons

      - name: Build the Estimate installer (NSIS)
        working-directory: estimate
        run: cargo tauri build

      - name: Rename installer to stable asset name
        shell: bash
        run: |
          exe=$(ls estimate/src-tauri/target/release/bundle/nsis/*.exe | head -1)
          cp "$exe" estimate/src-tauri/target/release/bundle/nsis/AORMS-Estimate-Setup.exe

      - uses: actions/upload-artifact@v4
        with:
          name: aorms-estimate-windows
          path: estimate/src-tauri/target/release/bundle/nsis/AORMS-Estimate-Setup.exe
          if-no-files-found: error

      - name: Publish to GitHub Release
        if: inputs.release_tag != '' || startsWith(github.ref, 'refs/tags/estimate-v')
        uses: softprops/action-gh-release@v2
        with:
          name: AORMS Estimate ${{ inputs.release_tag || github.ref_name }}
          tag_name: ${{ inputs.release_tag || github.ref_name }}
          files: estimate/src-tauri/target/release/bundle/nsis/AORMS-Estimate-Setup.exe
