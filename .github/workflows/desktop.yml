name: desktop-installer

# Builds the AORMS desktop **Manager** — one edition-agnostic Tauri/NSIS
# installer that ships the complete licence-free payload (backend + Node
# sidecar), so a fresh install runs offline out of the box; a licence key at
# runtime switches it to managed provisioning (LITE or PRO decided from the
# licence) — on a clean Windows runner, and packages the downloadable
# components (backend + Node runtime) the Manager pulls online. Manual
# (workflow_dispatch) or on a `desktop-v*` tag, which also publishes the
# installer + components to a GitHub Release (their download URLs go into the
# hub's component manifest). A Linux box cannot build Windows installers — see
# desktop/README.md.
#
# The @hcw/* kits are vendored in-repo under vendor/ (lockfile links them as
# link:vendor/hcw-*), so a single checkout is self-contained — no sibling repos.
on:
  workflow_dispatch:
  push:
    tags: ["desktop-v*"]

permissions:
  contents: write

concurrency:
  group: desktop-${{ github.ref }}
  cancel-in-progress: true

jobs:
  windows:
    name: Windows Manager installer + components (NSIS)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: pnpm }

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with: { workspaces: desktop/src-tauri }

      - name: Install tauri-cli
        run: cargo install tauri-cli --version "^2.0" --locked

      - name: Install dependencies (native Windows)
        run: pnpm install

      - name: Preflight — host buildability
        run: pnpm desktop:doctor

      # Tauri icons are git-ignored (generated). Regenerate from the app mark so
      # the bundler's icon paths resolve.
      - name: Generate Tauri icons
        shell: bash
        run: |
          mkdir -p desktop/src-tauri/icons
          cargo tauri icon frontend/public/android-chrome-512x512.png -o desktop/src-tauri/icons

      # Builds the thin Manager installer. `desktop:assemble` (run by build) also
      # stages the backend under resources/backend, which package-components reuses.
      - name: Build Manager installer
        run: pnpm desktop:build
        env:
          # Baked into the Rust shell (option_env!) as the unmanaged-install
          # fallback so installed apps can call the licensing cloud's /v1
          # product API (Company → Licence activation) before a Manager config
          # is provisioned. Mint on the hub (admin console → Products → API
          # keys) and store as a repo secret. Empty = activation is off; the
          # build still succeeds.
          AORMS_PRODUCT_API_KEY: ${{ secrets.AORMS_PRODUCT_API_KEY }}

      - name: Package downloadable components (backend + node)
        run: pnpm desktop:package-components

      - uses: actions/upload-artifact@v4
        with:
          name: aorms-manager-windows
          path: |
            desktop/src-tauri/target/release/bundle/nsis/*.exe
            desktop/dist-components/*
          if-no-files-found: error

      # On a desktop-v* tag, publish the installer + component tarballs +
      # components.json to a GitHub Release. Those asset URLs are what an admin
      # registers on the hub (admin.components.publish) so /v1/manifest serves
      # them to Managers.
      - name: Publish to GitHub Release
        if: startsWith(github.ref, 'refs/tags/desktop-v')
        uses: softprops/action-gh-release@v2
        with:
          name: AORMS Desktop ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          files: |
            desktop/src-tauri/target/release/bundle/nsis/*.exe
            desktop/dist-components/backend-*.tar.gz
            desktop/dist-components/node-*.tar.gz
            desktop/dist-components/components.json
