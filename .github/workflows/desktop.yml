name: desktop-installer

# Builds the AORMS desktop app (Tauri) on a clean Windows runner — all three
# editions (Lite/Core/Enterprise) — and uploads the NSIS installers as artifacts.
# Manual (workflow_dispatch) or on a `desktop-v*` tag (which also publishes them to
# a GitHub Release). This is the reproducible "clean machine" build — a Linux box
# (dev container or VPS) cannot build Windows installers. See desktop/README.md.
#
# The @hcw/* kits are vendored in-repo under vendor/ (lockfile links them as
# link:vendor/hcw-*), so a single checkout is self-contained — no sibling repos.
on:
  workflow_dispatch:
  push:
    tags: ["desktop-v*"]

permissions:
  contents: write

concurrency:
  group: desktop-${{ github.ref }}
  cancel-in-progress: true

jobs:
  windows:
    name: Windows installer (NSIS)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: pnpm }

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with: { workspaces: desktop/src-tauri }

      - name: Install tauri-cli
        run: cargo install tauri-cli --version "^2.0" --locked

      - name: Install dependencies (native Windows)
        run: pnpm install

      - name: Preflight — host buildability
        run: pnpm desktop:doctor

      # Tauri icons are git-ignored (generated). Regenerate from the app mark so
      # the bundler's icon paths resolve.
      - name: Generate Tauri icons
        shell: bash
        run: |
          mkdir -p desktop/src-tauri/icons
          cargo tauri icon frontend/public/android-chrome-512x512.png -o desktop/src-tauri/icons

      - name: Build installers (Lite + Core + Enterprise)
        run: pnpm desktop:build-editions

      - uses: actions/upload-artifact@v4
        with:
          name: aorms-desktop-installers
          path: desktop/dist-installers/*.exe
          if-no-files-found: error

      # On a desktop-v* tag, publish all three installers to a GitHub Release so
      # they have stable download URLs (deploy/fetch-installers.sh pulls them onto
      # the VPS /download page).
      - name: Publish installers to GitHub Release
        if: startsWith(github.ref, 'refs/tags/desktop-v')
        uses: softprops/action-gh-release@v2
        with:
          name: AORMS Desktop ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          files: desktop/dist-installers/*.exe
