name: desktop-installer

# Builds the AORMS desktop **Manager** — one edition-agnostic Tauri/NSIS
# installer that ships the complete licence-free payload (backend + Node
# sidecar), so a fresh install runs offline out of the box; a licence key at
# runtime switches it to managed provisioning (LITE or PRO decided from the
# licence) — on a clean Windows runner, and packages the downloadable
# components (backend + Node runtime) the Manager pulls online. Manual
# (workflow_dispatch) or on a `desktop-v*` tag, which also publishes the
# installer + components to a GitHub Release (their download URLs go into the
# hub's component manifest). A Linux box cannot build Windows installers — see
# desktop/README.md.
#
# The @hcw/* kits are vendored in-repo under vendor/ (lockfile links them as
# link:vendor/hcw-*), so a single checkout is self-contained — no sibling repos.
on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Publish a Release under this desktop-v* tag (created if missing). Empty = build only."
        required: false
        default: ""
  push:
    tags: ["desktop-v*"]

permissions:
  contents: write

concurrency:
  group: desktop-${{ github.ref }}
  cancel-in-progress: true

jobs:
  windows:
    name: Windows Manager installer + components (NSIS)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: pnpm }

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with: { workspaces: desktop/src-tauri }

      - name: Install tauri-cli
        run: cargo install tauri-cli --version "^2.0" --locked

      - name: Install dependencies (native Windows)
        run: pnpm install

      - name: Preflight — host buildability
        run: pnpm desktop:doctor

      # Tauri icons are git-ignored (generated). Regenerate from the app mark so
      # the bundler's icon paths resolve.
      - name: Generate Tauri icons
        shell: bash
        run: |
          mkdir -p desktop/src-tauri/icons
          cargo tauri icon frontend/public/android-chrome-512x512.png -o desktop/src-tauri/icons

      # Builds the thin Manager installer. `desktop:assemble` (run by build) also
      # stages the backend under resources/backend, which package-components reuses.
      - name: Build Manager installer
        run: pnpm desktop:build
        env:
          # Baked into the Rust shell (option_env!) as the unmanaged-install
          # fallback so installed apps can call the licensing cloud's /v1
          # product API (Company → Licence activation) before a Manager config
          # is provisioned. Mint on the hub (admin console → Products → API
          # keys) and store as a repo secret. Empty = activation is off; the
          # build still succeeds.
          AORMS_PRODUCT_API_KEY: ${{ secrets.AORMS_PRODUCT_API_KEY }}
          # The postgresql_embedded `bundled` feature stages the PG archive at
          # compile time by listing theseus-rs/postgresql-binaries releases via
          # the GitHub API. Authenticate so the request uses the 5000/hr limit
          # instead of the 60/hr anonymous one (which 403s on shared runners).
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Package downloadable components (backend + node)
        run: pnpm desktop:package-components

      # Stable asset name: one edition-agnostic installer (the edition comes
      # from the licence at runtime). deploy/fetch-installers.sh keys on it.
      - name: Rename installer to stable asset name
        shell: bash
        run: |
          exe=$(ls desktop/src-tauri/target/release/bundle/nsis/*.exe | head -1)
          cp "$exe" desktop/src-tauri/target/release/bundle/nsis/AORMS-Setup.exe

      - uses: actions/upload-artifact@v4
        with:
          name: aorms-manager-windows
          path: |
            desktop/src-tauri/target/release/bundle/nsis/AORMS-Setup.exe
            desktop/dist-components/*
          if-no-files-found: error

      # On a desktop-v* tag, publish the installer + component tarballs +
      # components.json to a GitHub Release. Those asset URLs are what an admin
      # registers on the hub (admin.components.publish) so /v1/manifest serves
      # them to Managers.
      - name: Publish to GitHub Release
        if: startsWith(github.ref, 'refs/tags/desktop-v') || startsWith(inputs.release_tag, 'desktop-v')
        uses: softprops/action-gh-release@v2
        with:
          name: AORMS Desktop ${{ inputs.release_tag || github.ref_name }}
          tag_name: ${{ inputs.release_tag || github.ref_name }}
          files: |
            desktop/src-tauri/target/release/bundle/nsis/AORMS-Setup.exe
            desktop/dist-components/backend-*.tar.gz
            desktop/dist-components/node-*.tar.gz
            desktop/dist-components/components.json

  community:
    name: Windows Community installer (NSIS)
    runs-on: windows-latest
    # The free, offline, LAN-only appliance: AORMS_EDITION=COMMUNITY is baked into
    # the Rust shell (option_env!) so the backend boots with ESTI_EDITION=COMMUNITY
    # (licence-free, no hub, seeds the first-run admin). A distinct product name +
    # identifier lets it install standalone. No downloadable components — Community
    # is fully offline and never provisions from the hub.
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: pnpm }

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with: { workspaces: desktop/src-tauri }

      - name: Install tauri-cli
        run: cargo install tauri-cli --version "^2.0" --locked

      - name: Install dependencies (native Windows)
        run: pnpm install

      - name: Preflight — host buildability
        run: pnpm desktop:doctor

      - name: Generate Tauri icons
        shell: bash
        run: |
          mkdir -p desktop/src-tauri/icons
          cargo tauri icon frontend/public/android-chrome-512x512.png -o desktop/src-tauri/icons

      # Bake AORMS_EDITION=COMMUNITY at Rust compile time; override the product
      # name + identifier so the Community appliance installs standalone.
      - name: Build Community installer
        run: |
          pnpm desktop:assemble
          cargo tauri build --config desktop/src-tauri/tauri.conf.json --config '{"productName":"AORMS Community","identifier":"in.aorms.esti.community"}'
        env:
          AORMS_EDITION: COMMUNITY
          # Authenticate the bundled-PostgreSQL archive fetch (see the Manager
          # job). Offline appliance ⇒ the embedded PG binaries matter most here.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Rename installer to stable asset name
        shell: bash
        run: |
          exe=$(ls desktop/src-tauri/target/release/bundle/nsis/*.exe | head -1)
          cp "$exe" desktop/src-tauri/target/release/bundle/nsis/AORMS-Community-Setup.exe

      - uses: actions/upload-artifact@v4
        with:
          name: aorms-community-windows
          path: desktop/src-tauri/target/release/bundle/nsis/AORMS-Community-Setup.exe
          if-no-files-found: error

      - name: Publish to GitHub Release
        if: startsWith(github.ref, 'refs/tags/desktop-v') || startsWith(inputs.release_tag, 'desktop-v')
        uses: softprops/action-gh-release@v2
        with:
          name: AORMS Desktop ${{ inputs.release_tag || github.ref_name }}
          tag_name: ${{ inputs.release_tag || github.ref_name }}
          files: desktop/src-tauri/target/release/bundle/nsis/AORMS-Community-Setup.exe
