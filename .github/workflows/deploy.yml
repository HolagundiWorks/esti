name: deploy-vps

on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: deploy-vps
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Set up deploy key
        run: |
          mkdir -p ~/.ssh
          umask 077
          printf '%s\n' "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          PORT="${{ secrets.VPS_PORT }}"
          ssh-keyscan -p "${PORT:-22}" -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Pull + run deploy/update.sh on the VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_DEPLOY_DIR: ${{ secrets.VPS_DEPLOY_DIR }}
        run: |
          PORT="${VPS_PORT:-22}"
          DIR="${VPS_DEPLOY_DIR:-/opt/esti}"
          ssh -i ~/.ssh/deploy_key -p "$PORT" -o BatchMode=yes "$VPS_USER@$VPS_HOST" \
            "cd '$DIR' && bash deploy/update.sh"

      - name: Clean up deploy key
        if: always()
        run: rm -f ~/.ssh/deploy_key
