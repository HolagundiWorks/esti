name: deploy-vps

on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: deploy-vps
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Set up deploy key (retries keyscan — VPS may be transiently unreachable)
        run: |
          mkdir -p ~/.ssh
          umask 077
          printf '%s\n' "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          # Fail-fast SSH defaults: dead networks surface as errors in ~60s
          # instead of hanging a step forever.
          cat > ~/.ssh/config <<'EOF'
          Host *
            BatchMode yes
            ConnectTimeout 15
            ServerAliveInterval 15
            ServerAliveCountMax 4
          EOF
          PORT="${{ secrets.VPS_PORT }}"
          for i in 1 2 3 4 5; do
            if ssh-keyscan -T 10 -p "${PORT:-22}" -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null && [ -s ~/.ssh/known_hosts ]; then
              echo "keyscan ok (attempt $i)"; exit 0
            fi
            echo "keyscan attempt $i failed — VPS unreachable? retrying in 15s"; sleep 15
          done
          echo "::error::VPS ${{ secrets.VPS_HOST }} unreachable on SSH after 5 attempts"
          exit 1

      - name: Pull + run deploy/update.sh on the VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_DEPLOY_DIR: ${{ secrets.VPS_DEPLOY_DIR }}
        run: |
          PORT="${VPS_PORT:-22}"
          DIR="${VPS_DEPLOY_DIR:-/opt/esti}"
          ssh -i ~/.ssh/deploy_key -p "$PORT" "$VPS_USER@$VPS_HOST" \
            "cd '$DIR' && TERM=xterm bash deploy/update.sh"

      - name: Clean up deploy key
        if: always()
        run: rm -f ~/.ssh/deploy_key
