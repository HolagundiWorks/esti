name: esti-ci

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  node:
    name: TypeScript (contracts · backend · frontend)
    runs-on: ubuntu-latest
    # @hcw/aorms-ai-kit is vendored under vendor/ (resolved by pnpm workspace) —
    # a single checkout is self-contained. The private sibling-repo checkouts used
    # to fail here (default token can't read them), which was breaking CI.
    steps:
      - uses: actions/checkout@v4
      # pnpm version comes from the packageManager field in package.json —
      # action-setup errors if both specify one.
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: pnpm }
      - run: pnpm install
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm test
      - run: pnpm --filter @esti/backend build
      - run: pnpm --filter @esti/frontend build

  python:
    name: Python worker
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: worker } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      # Pure-wheel deps only — enough to import every handler module and run the
      # unit tests. WeasyPrint (needs pango/cairo system libs) is imported lazily
      # inside render_pdf, so it is intentionally omitted here.
      - run: >
          pip install ruff pytest redis pydantic-settings
          ezdxf pandas openpyxl boto3 "psycopg[binary]"
      - run: ruff check .
      # python -m puts worker/ on sys.path so tests import esti_worker.
      - run: python -m pytest -q
