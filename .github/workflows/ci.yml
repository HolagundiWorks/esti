name: esti-ci

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  node:
    name: TypeScript (contracts · backend · frontend · kits)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: esti
    steps:
      - uses: actions/checkout@v4
        with:
          path: esti
      # All HCW kits are vendored under esti/vendor/ (resolved by pnpm workspace) —
      # no external kit checkouts needed. The private sibling-repo checkouts used to
      # fail here (default token can't read them), which was breaking CI.
      - uses: pnpm/action-setup@v4
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: pnpm, cache-dependency-path: esti/pnpm-lock.yaml }
      - run: pnpm install
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm test
      - run: pnpm --filter @esti/backend build
      - run: pnpm --filter @esti/frontend build

  python:
    name: Python worker
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: worker } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      # Pure-wheel deps only — enough to import every handler module and run the
      # unit tests. WeasyPrint (needs pango/cairo system libs) is imported lazily
      # inside render_pdf, so it is intentionally omitted here.
      - run: >
          pip install ruff pytest redis pydantic-settings
          ezdxf pandas openpyxl boto3 "psycopg[binary]"
      - run: ruff check .
      - run: pytest -q
