name: esti-ci

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  node:
    name: TypeScript (contracts · backend · frontend)
    runs-on: ubuntu-latest
    # @hcw/aorms-ai-kit is vendored under vendor/ (resolved by pnpm workspace) —
    # a single checkout is self-contained. The private sibling-repo checkouts used
    # to fail here (default token can't read them), which was breaking CI.
    steps:
      - uses: actions/checkout@v4
      # pnpm version comes from the packageManager field in package.json —
      # action-setup errors if both specify one.
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: pnpm }
      - run: pnpm install
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm test
      - run: pnpm --filter @esti/backend build
      - run: pnpm --filter @esti/frontend build

  audit:
    name: Dependency audit (high+)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: pnpm }
      - run: pnpm install
      - run: pnpm audit --audit-level=high

  visual:
    name: Visual regression (design system)
    runs-on: ubuntu-latest
    # Pinned Playwright image so rendering matches the committed *-linux.png
    # baselines exactly (font/AA/GPU determinism). Bump this tag AND regenerate
    # baselines together (see e2e/tests/visual-regression.spec.ts).
    container:
      image: mcr.microsoft.com/playwright:v1.49.0-jammy
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: pnpm }
      - run: pnpm install
      - name: Build · serve · assert
        # vite preview serves the production build with SPA fallback (public
        # pages only — no backend needed for /design-system and /).
        run: |
          pnpm --filter @esti/frontend build
          pnpm --filter @esti/frontend exec vite preview --host 0.0.0.0 --port 5173 &
          npx --yes wait-on -t 90000 http://localhost:5173/
          cd e2e && npm ci
          AORMS_BASE_URL=http://localhost:5173 npx playwright test visual-regression
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: visual-diff
          path: e2e/test-results/
          retention-days: 7

  e2e:
    name: End-to-end (full stack + demo seed)
    runs-on: ubuntu-latest
    # Heavy (builds the stack + boots every service) — gate to pull requests so
    # ordinary branch pushes stay fast. The `visual` job still runs everywhere.
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: pnpm }
      - name: Boot the stack (db · redis · minio · backend · worker · frontend)
        # Ollama is intentionally left out — AI features are not exercised by the
        # suite and its image/model pull would dominate the job.
        # ESTI_RELAX_AUTH_LIMITS: e2e reuses one runner IP for many persona logins.
        env:
          ESTI_RELAX_AUTH_LIMITS: "true"
        run: docker compose up -d --build db redis minio backend worker frontend
      - name: Wait for backend + frontend
        run: |
          npx --yes wait-on -t 180000 http://localhost:4000/health http://localhost:5173
      - name: Seed the demo workspace (5 personas + demo data)
        run: docker compose exec -T backend pnpm --filter @esti/backend seed:demo
      - name: Install Playwright (chromium)
        working-directory: e2e
        run: |
          npm ci
          npx playwright install --with-deps chromium
      - name: Run the full e2e suite
        working-directory: e2e
        env:
          CI: "true"
          AORMS_BASE_URL: http://localhost:5173
        run: npx playwright test
      - name: Dump backend logs on failure
        if: failure()
        run: docker compose logs --no-color --tail=200 backend worker || true
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: e2e-report
          path: |
            e2e/playwright-report/
            e2e/test-results/
          retention-days: 7

  python:
    name: Python worker
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: worker } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      # Pure-wheel deps only — enough to import every handler module and run the
      # unit tests. WeasyPrint (needs pango/cairo system libs) is imported lazily
      # inside render_pdf, so it is intentionally omitted here.
      - run: >
          pip install ruff pytest redis pydantic-settings
          ezdxf pandas openpyxl boto3 "psycopg[binary]"
      - run: ruff check .
      # python -m puts worker/ on sys.path so tests import esti_worker.
      - run: python -m pytest -q
